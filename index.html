<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tally — アンケート集計</title>
</head>
<body>

<header>
  <h1>GT集計</h1>
  <span>SURVEY AGGREGATOR v0.1</span>
  <div class="wasm-status">
    <div class="status-dot loading" id="wasm-dot"></div>
    <span id="wasm-label">Ruby Wasm 読み込み中...</span>
  </div>
</header>

<main>
  <!-- LEFT: 設定パネル -->
  <div class="panel-left">

    <!-- CSVアップロード -->
    <div class="section">
      <div class="section-label">01 / データ読み込み</div>
      <div class="dropzone" id="dropzone">
        <input type="file" id="file-input" accept=".csv">
        <span class="dropzone-icon">📂</span>
        <div class="dropzone-text">
          <strong>CSVをドロップ or クリック</strong>
          1行目ヘッダー、UTF-8 or Shift-JIS
        </div>
      </div>
      <div id="file-info" style="margin-top:0.75rem;font-size:0.72rem;color:var(--muted);"></div>
    </div>

    <!-- 列設定 -->
    <div class="section hidden" id="col-config-section">
      <div class="section-label">02 / 列の種別設定</div>
      <div class="col-list" id="col-list"></div>
    </div>

    <!-- ウェイト列 -->
    <div class="section hidden" id="weight-section">
      <div class="section-label">03 / ウェイトバック</div>
      <div class="weight-select-wrap">
        <label>ウェイト列（任意）</label>
        <select class="weight-col-select" id="weight-col-select">
          <option value="">— ウェイトなし（実数集計）—</option>
        </select>
      </div>
    </div>

    <div id="error-msg" class="hidden"></div>

    <button class="run-btn hidden" id="run-btn" disabled>▶ GT集計を実行</button>
  </div>

  <!-- RIGHT: 結果パネル -->
  <div class="panel-right" id="panel-right">
    <div class="empty-state" id="empty-state">
      <span class="big">⬛</span>
      <p>CSVを読み込んで集計を実行してください</p>
    </div>
    <div class="hidden" id="results-area"></div>
  </div>
</main>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
