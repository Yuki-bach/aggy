<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Bar chart bars forming the shape of letter "A" -->
  <!-- Left leg of A (ascending bars) -->
  <rect x="2" y="18" width="5" height="12" rx="1" fill="#3b82f6"/>
  <rect x="8" y="12" width="5" height="18" rx="1" fill="#2563eb"/>

  <!-- Right leg of A (descending bars) -->
  <rect x="19" y="12" width="5" height="18" rx="1" fill="#2563eb"/>
  <rect x="25" y="18" width="5" height="12" rx="1" fill="#3b82f6"/>

  <!-- Center bar of A (crossbar) — also the tallest bar -->
  <rect x="13.5" y="4" width="5" height="26" rx="1" fill="#1d4ed8"/>

  <!-- Horizontal crossbar connecting the A -->
  <rect x="7" y="19" width="18" height="3" rx="1" fill="#1e40af" opacity="0.85"/>
</svg>
