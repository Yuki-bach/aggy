name: Release PR

on:
  push:
    branches: [develop]

jobs:
  release-pr:
    runs-on: ubuntu-slim
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Create or update release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh pr list --base main --head develop --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            echo "Release PR #$existing already exists"
          else
            gh pr create \
              --base main \
              --head develop \
              --title "release: develop → main" \
              --body "Automated release PR from develop to main."
          fi
