name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: .node-version
          cache: true

      - name: Check (lib)
        run: cd packages/lib && vp check

      - name: Test (lib)
        run: cd packages/lib && vp test run

      - name: Check (web)
        run: cd apps/web && vp check

      - name: Test (web)
        run: cd apps/web && vp test run

      - name: Build (web)
        run: cd apps/web && vp build

      - name: Check (desktop)
        run: cd apps/desktop && vp check

      - name: Test (desktop)
        run: cd apps/desktop && vp test run
